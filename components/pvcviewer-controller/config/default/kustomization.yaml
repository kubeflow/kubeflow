# Adds namespace to all resources.
# Note: the namespace name needs to be changed here and cannot be changed in an overlay
# This is because certmanager and webhook use kustomize names to configure resources.
# Setting another namespace here as in the overlay will lead to e.g. wrong DNSNames being generated.
namespace: kubeflow

# Value of this field is prepended to the
# names of all resources, e.g. a deployment named
# "wordpress" becomes "alices-wordpress".
# Note that it should also match with the prefix (text before '-') of the namespace
# field above.
namePrefix: pvcviewer-

# Labels to add to all resources and selectors.
labels:
- includeSelectors: true
  pairs:
    app: pvcviewer

resources:
- ../crd
- ../rbac
- ../manager
- ../webhook
- ../certmanager
# [PROMETHEUS] To enable prometheus monitor, uncomment all sections with 'PROMETHEUS'.
#- ../prometheus

patches:
# Do not create a namespace
- path: remove_namespace.yaml
# Protect the /metrics endpoint by putting it behind auth.
# If you want your controller-manager to expose the /metrics
# endpoint w/o any authn/z, please comment the following line.
- path: manager_auth_proxy_patch.yaml
- path: manager_webhook_patch.yaml
- path: cainjection_patch.yaml
- path: dnsnames_patch.yaml

# Replacements for cert-manager CA injection annotation and Certificate dnsNames.
replacements:
# Certificate namespace and name → webhook/CRD annotation (format namespace/certname).
- source:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: pvcviewer-serving-cert
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: MutatingWebhookConfiguration
      name: pvcviewer-mutating-webhook-configuration
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: "/"
      index: 0
  - select:
      kind: ValidatingWebhookConfiguration
      name: pvcviewer-validating-webhook-configuration
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: "/"
      index: 0
  - select:
      kind: CustomResourceDefinition
      name: pvcviewers.kubeflow.org
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: "/"
      index: 0
- source:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: pvcviewer-serving-cert
    fieldPath: metadata.name
  targets:
  - select:
      kind: MutatingWebhookConfiguration
      name: pvcviewer-mutating-webhook-configuration
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: "/"
      index: 1
  - select:
      kind: ValidatingWebhookConfiguration
      name: pvcviewer-validating-webhook-configuration
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: "/"
      index: 1
  - select:
      kind: CustomResourceDefinition
      name: pvcviewers.kubeflow.org
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: "/"
      index: 1
# Service name and namespace → Certificate dnsNames (format service.namespace.svc[.cluster.local]).
- source:
    kind: Service
    version: v1
    name: pvcviewer-webhook-service
    fieldPath: metadata.name
  targets:
  - select:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: pvcviewer-serving-cert
    fieldPaths:
    - spec.dnsNames.0
    - spec.dnsNames.1
    options:
      delimiter: "."
      index: 0
- source:
    kind: Service
    version: v1
    name: pvcviewer-webhook-service
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: pvcviewer-serving-cert
    fieldPaths:
    - spec.dnsNames.0
    - spec.dnsNames.1
    options:
      delimiter: "."
      index: 1

