apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kubeflow
resources:
- ../../base
- service.yaml
- virtual-service.yaml
- authorizationpolicy.yaml

labels:
- includeSelectors: true
  pairs:
    kustomize.component: profiles

patches:
- path: patches/kfam.yaml
- path: patches/remove-namespace.yaml

# Replacement for VirtualService destination host (service.namespace.svc.cluster.local).
replacements:
- source:
    kind: Service
    name: profiles-kfam
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: VirtualService
      name: profiles-kfam
    fieldPaths:
    - spec.http.0.route.0.destination.host
    options:
      delimiter: "."
      index: 1

images:
- name: ghcr.io/kubeflow/kubeflow/kfam
  newName: ghcr.io/kubeflow/kubeflow/kfam
  newTag: v1.10.0
