apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: volumes-web-app
        image: ghcr.io/kubeflow/kubeflow/volumes-web-app
        ports:
        - containerPort: 5000
        env:
        - name: APP_PREFIX
          value: placeholder
        - name: USERID_HEADER
          value: placeholder
        - name: USERID_PREFIX
          value: placeholder
        - name: APP_SECURE_COOKIES
          value: placeholder
        - name: VOLUME_VIEWER_IMAGE
          value: filebrowser/filebrowser:v2.25.0
        - name: METRICS
          value: placeholder
        volumeMounts: 
        - name: viewer-spec
          mountPath: /etc/config/viewer-spec.yaml
          subPath: viewer-spec.yaml 
      serviceAccountName: service-account
      volumes: 
      - name: viewer-spec
        configMap: 
          name: viewer-spec
