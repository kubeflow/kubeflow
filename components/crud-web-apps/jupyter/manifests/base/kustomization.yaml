# TODO(https://github.com/kubeflow/manifests/issues/774):
# This is a legacy package. Hopefully we can get rid of it once
# 774 is complete.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# TODO(jlewi): We can't depend on base because of the deployment_patch.
# but maybe if we changed that to use ConfigMapRef then the patch would correctly
# override the patch applied in base_v3
resources:
- cluster-role-binding.yaml
- cluster-role.yaml
- deployment.yaml
- role-binding.yaml
- role.yaml
- service-account.yaml
- service.yaml
- configs/logos-configmap.yaml
namePrefix: jupyter-web-app-
namespace: kubeflow
labels:
- includeSelectors: true
  pairs:
    app: jupyter-web-app
    kustomize.component: jupyter-web-app
images:
- name: ghcr.io/kubeflow/kubeflow/jupyter-web-app
  newName: ghcr.io/kubeflow/kubeflow/jupyter-web-app
  newTag: v1.10.0
# We need the name to be unique without the suffix because the original name is what
# gets used with patches
configMapGenerator:
- envs:
  - params.env
  name: parameters
- files:
  - configs/spawner_ui_config.yaml
  name: config
replacements:
- source:
    kind: ConfigMap
    name: jupyter-web-app-parameters
    fieldPath: data.JWA_PREFIX
  targets:
  - select:
      kind: Deployment
      name: jupyter-web-app-deployment
    fieldPaths:
    - spec.template.spec.containers.[name=jupyter-web-app].env.[name=APP_PREFIX].value
- source:
    kind: ConfigMap
    name: jupyter-web-app-parameters
    fieldPath: data.JWA_UI
  targets:
  - select:
      kind: Deployment
      name: jupyter-web-app-deployment
    fieldPaths:
    - spec.template.spec.containers.[name=jupyter-web-app].env.[name=UI].value
- source:
    kind: ConfigMap
    name: jupyter-web-app-parameters
    fieldPath: data.JWA_USERID_PREFIX
  targets:
  - select:
      kind: Deployment
      name: jupyter-web-app-deployment
    fieldPaths:
    - spec.template.spec.containers.[name=jupyter-web-app].env.[name=USERID_PREFIX].value
- source:
    kind: ConfigMap
    name: jupyter-web-app-parameters
    fieldPath: data.JWA_USERID_HEADER
  targets:
  - select:
      kind: Deployment
      name: jupyter-web-app-deployment
    fieldPaths:
    - spec.template.spec.containers.[name=jupyter-web-app].env.[name=USERID_HEADER].value
- source:
    kind: ConfigMap
    name: jupyter-web-app-parameters
    fieldPath: data.JWA_APP_SECURE_COOKIES
  targets:
  - select:
      kind: Deployment
      name: jupyter-web-app-deployment
    fieldPaths:
    - spec.template.spec.containers.[name=jupyter-web-app].env.[name=APP_SECURE_COOKIES].value
- source:
    kind: ConfigMap
    name: jupyter-web-app-parameters
    fieldPath: data.JWA_APP_ENABLE_METRICS
  targets:
  - select:
      kind: Deployment
      name: jupyter-web-app-deployment
    fieldPaths:
    - spec.template.spec.containers.[name=jupyter-web-app].env.[name=METRICS].value
