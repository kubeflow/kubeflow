# This overlay uses CertManager to provision a certificate for the
# PodDefaults admission controller. This is preferred over the old
# way of using "bootstrap" which was running a shell script to create
# the certificate.
# TODO(jlewi): We should eventually refactor the manifests to delete
# bootstrap and use certmanager by default.

resources:
- ../../base
- certificate.yaml

namespace: kubeflow

namePrefix: admission-webhook-

labels:
- includeSelectors: true
  pairs:
    app: poddefaults
    kustomize.component: poddefaults
    app.kubernetes.io/component: poddefaults
    app.kubernetes.io/name: poddefaults

patches:
- path: mutating-webhook-configuration.yaml
- path: deployment.yaml

generatorOptions:
  disableNameSuffixHash: true

replacements:
# Webhook name: use prefixed deployment name (overlay has namePrefix).
- source:
    kind: Deployment
    name: deployment
    fieldPath: metadata.name
  targets:
  - select:
      kind: MutatingWebhookConfiguration
      name: mutating-webhook-configuration
    fieldPaths:
    - webhooks.0.name
    options:
      delimiter: "."
      index: 0
# Service name and namespace for Certificate commonName/dnsNames (index 0 and 1).
- source:
    kind: Service
    name: service
    fieldPath: metadata.name
  targets:
  - select:
      kind: Certificate
      name: cert
    fieldPaths:
    - spec.commonName
    - spec.dnsNames.0
    - spec.dnsNames.1
    options:
      delimiter: "."
      index: 0
- source:
    kind: Service
    name: service
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: Certificate
      name: cert
    fieldPaths:
    - spec.commonName
    - spec.dnsNames.0
    - spec.dnsNames.1
    options:
      delimiter: "."
      index: 1
  - select:
      kind: MutatingWebhookConfiguration
      name: mutating-webhook-configuration
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: "/"
      index: 0
# Certificate name for webhook CA injection annotation (index 1).
- source:
    kind: Certificate
    name: cert
    fieldPath: metadata.name
  targets:
  - select:
      kind: MutatingWebhookConfiguration
      name: mutating-webhook-configuration
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: "/"
      index: 1

configurations:
- params.yaml
